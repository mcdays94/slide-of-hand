name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-progress run on the same ref so a series of pushes doesn't
# queue stale runs. PRs are keyed by github.ref (refs/pull/N/merge); pushes
# to main are keyed by refs/heads/main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
