<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon set (#217). SVG is the preferred icon; PNG fallbacks
         cover platforms that don't render SVG favicons (iOS home screen,
         older Androids). Theme-color paints the browser chrome to match
         the deck background in light + dark modes. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#FFFBF5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1310" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Slide of Hand — JSX-first deck platform on Cloudflare Workers."
    />
    <title>Slide of Hand</title>
    <!--
      Anti-FOUC inline styles. We paint the design-system background + text
      colour BEFORE the bundle loads so the page never flashes white. The
      tokens here mirror src/styles/index.css; keep them in sync.

      Never pure white (#FFFFFF) for the body, never pure black (#000000) for
      text — see AGENTS.md § Anti-patterns.
    -->
    <style>
      :root {
        color-scheme: light;
        --color-cf-bg-100: #FFFBF5;
        --color-cf-text: #521000;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--color-cf-bg-100);
        color: var(--color-cf-text);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
